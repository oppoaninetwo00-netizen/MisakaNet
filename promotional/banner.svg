<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
      .px { font-family: 'Press Start 2P', 'Courier New', monospace; }
    </style>
  </defs>
  <rect width="800" height="450" fill="#0d0d1a"/>
  <g opacity="0.03" stroke="#fff" stroke-width="1">
    <line x1="0" y1="0" x2="800" y2="0"/>
    <line x1="0" y1="4" x2="800" y2="4"/>
    <line x1="0" y1="8" x2="800" y2="8"/>
  </g>
  <image href="../avatars/Misaka10001.png" x="80" y="130" width="128" height="128" image-rendering="pixelated"/>
  <text x="144" y="290" class="px" font-size="9" fill="#5a6a8a" text-anchor="middle">10001</text>
  <text x="400" y="155" class="px" font-size="36" fill="#00e5ff" text-anchor="middle" letter-spacing="2">MisakaNet</text>
  <line x1="280" y1="175" x2="520" y2="175" stroke="#1a1a3a" stroke-width="1"/>
  <text x="400" y="215" class="px" font-size="11" fill="#8892b0" text-anchor="middle" letter-spacing="1">Safe · Useful · Zero-Dep</text>
  <text x="400" y="245" class="px" font-size="10" fill="#5a6a8a" text-anchor="middle">The Agent Library</text>
  <text x="400" y="295" class="px" font-size="8" fill="#7890b0" text-anchor="middle">git clone. No server. No deps.</text>
  <text x="400" y="340" class="px" font-size="8" fill="#2a2a5a" text-anchor="middle">v2.0.0</text>
  <rect x="590" y="141" width="10" height="4" fill="#00e5ff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.1;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
      .px { font-family: 'Press Start 2P', 'Courier New', monospace; }
    </style>
  </defs>
  <rect width="900" height="480" fill="#070712"/>
  <image href="../avatars/Misaka10001.png" x="80" y="140" width="160" height="160" image-rendering="pixelated"/>
  <text x="160" y="330" class="px" font-size="11" fill="#7890b0" text-anchor="middle">10001</text>
  <text x="460" y="165" class="px" font-size="52" fill="#00ffff" text-anchor="middle" letter-spacing="3">MisakaNet</text>
  <line x1="300" y1="190" x2="620" y2="190" stroke="#1a1a4a" stroke-width="1"/>
  <text x="460" y="230" class="px" font-size="15" fill="#b0c0d0" text-anchor="middle" letter-spacing="2">Safe · Useful · Zero-Dep</text>
  <text x="460" y="270" class="px" font-size="13" fill="#8090b0" text-anchor="middle" letter-spacing="1">The Agent Library</text>
  <text x="460" y="330" class="px" font-size="11" fill="#a0b0d0" text-anchor="middle">git clone. No server. No deps.</text>
  <text x="460" y="390" class="px" font-size="10" fill="#3a3a6a" text-anchor="middle">v2.0.0</text>
  <rect x="680" y="150" width="12" height="5" fill="#00ffff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.1;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
